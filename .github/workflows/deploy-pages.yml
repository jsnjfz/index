name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: homepage
        run: bun install --no-save

      - name: Build
        working-directory: homepage
        run: bun run build

      - name: Sync branch Pages output
        if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip pages-sync]')
        shell: bash
        run: |
          rm -rf assets
          cp -r homepage/dist/assets assets
          cp homepage/dist/index.html index.html
          cp homepage/dist/avatar.jpg avatar.jpg
          touch .nojekyll

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html avatar.jpg assets .nojekyll

          if git diff --cached --quiet; then
            echo "Pages output is already up to date."
          else
            git commit -m "chore: sync pages output [skip pages-sync]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: homepage/dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
